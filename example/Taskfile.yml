version: '3'

tasks:

  dev:
    desc: Start server + shadow-cljs watch together (via overmind)
    cmds:
      - overmind start

  server:
    desc: Start the Clojure server on :3000
    cmds:
      - clojure -X:run

  cljs:
    desc: Start shadow-cljs watch on :8080
    cmds:
      - bunx shadow-cljs -A:cljs watch app

  css:
    desc: Tailwind watch — rebuilds resources/public/css/app.css
    cmds:
      - bunx tailwindcss -i tailwind.css -o resources/public/css/app.css --watch

  css-build:
    desc: One-shot Tailwind build
    cmds:
      - bunx tailwindcss -i tailwind.css -o resources/public/css/app.css

  test:
    desc: Render-smoke-test every guide page under happy-dom
    cmds:
      - bunx shadow-cljs -A:cljs:test compile node-test
      - node --conditions=browser out/node-tests.js

  test-jvm:
    desc: Full-stack JVM tests — real components + solidrpc.live + datomic, no HTTP
    cmds:
      - clojure -M:jvm-test

  caddy:
    cmds:
      - caddy run
